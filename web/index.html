<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>kiro-flock</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface-2: #1a1a24;
    --border: #2a2a3a;
    --border-light: #3a3a50;
    --text: #ffffff;
    --text-dim: #e0e0ea;
    --text-muted: #a0a0b8;
    --accent: #9046ff;
    --accent-dim: rgba(144, 70, 255, 0.18);
    --accent-hover: #a060ff;
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.15);
    --yellow: #facc15;
    --yellow-dim: rgba(250, 204, 21, 0.15);
    --red: #fb7185;
    --red-dim: rgba(251, 113, 133, 0.15);
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .clock { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-running { background: var(--green-dim); color: var(--green); }
  .badge-running::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .badge-starting { background: var(--accent-dim); color: var(--accent); }
  .badge-starting::before { background: var(--accent); animation: pulse 1.5s ease-in-out infinite; }
  .badge-stopping { background: var(--red-dim); color: var(--red); }
  .badge-stopping::before { background: var(--red); animation: pulse 1.5s ease-in-out infinite; }
  .badge-stopped { background: var(--surface-2); color: var(--text-muted); }
  .badge-stopped::before { background: var(--text-muted); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Controls */
  .controls {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 18px;
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-start:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-stop { background: var(--surface-2); color: var(--red); border: 1px solid var(--border); }
  .btn-stop:hover { background: var(--red-dim); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .field { display: flex; align-items: flex-start; gap: 3px; flex-direction: column; }
  .field label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .field-hint { font-size: 10px; color: var(--text-muted); white-space: nowrap; min-height: 14px; }
  .field-row { display: flex; align-items: center; gap: 6px; }
  .field input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    width: 90px;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .field input::-webkit-inner-spin-button,
  .field input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input[type="text"] { width: 120px; }
  .field .stepper {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .field .stepper input {
    width: 44px;
    text-align: center;
    border-radius: 0;
    border-right: none;
    border-left: none;
  }
  .field .stepper button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 26px;
    height: 30px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    padding: 0;
    line-height: 1;
  }
  .field .stepper button:hover { background: var(--border); color: var(--text); }
  .field .stepper button:first-child { border-radius: 6px 0 0 6px; }
  .field .stepper button:last-child { border-radius: 0 6px 6px 0; }
  .separator { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  /* Direction */
  .direction-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  .direction-bar label { font-size: 12px; color: var(--text-dim); white-space: nowrap; padding-top: 7px; }
  .direction-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .direction-bar textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    resize: vertical;
    min-height: 52px;
    transition: border-color 0.15s;
  }
  .direction-bar textarea:focus { outline: none; border-color: var(--accent); }
  .direction-bar textarea.error { border-color: var(--red); }
  .direction-hint { font-size: 11px; color: var(--text-muted); }
  .btn-save { background: var(--surface-2); color: var(--accent); border: 1px solid var(--border); white-space: nowrap; }
  .btn-save:hover { border-color: var(--accent); }

  /* Toast */
  .toast {
    display: none;
    padding: 8px 24px;
    background: var(--red-dim);
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    border-bottom: 1px solid rgba(251,113,133,0.2);
    flex-shrink: 0;
  }
  .toast.visible { display: block; }

  /* Main layout: agent grid + resizable habitat panel */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* Agent grid */
  .grid-wrap {
    flex: 1;
    overflow-y: auto;
    min-width: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
    padding: 16px 20px;
  }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 10px; opacity: 0.3; }

  /* Resize handle */
  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

  /* Habitat panel */
  .habitat {
    width: 280px;
    min-width: 160px;
    max-width: 70vw;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    flex-shrink: 0;
  }
  .habitat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .habitat-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .habitat-back {
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    display: none;
  }
  .habitat-back:hover { color: var(--accent); border-color: var(--accent); }
  .habitat-back.visible { display: block; }

  /* File list */
  .habitat-files {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .habitat-file {
    display: flex;
    flex-direction: column;
    padding: 6px 14px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .habitat-file:hover { background: var(--surface-2); }
  .habitat-file.active { background: var(--accent-dim); }
  .habitat-file-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .habitat-file-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .habitat-empty { padding: 24px 14px; font-size: 12px; color: var(--text-muted); text-align: center; }
  .habitat-dl {
    margin-left: auto;
    padding: 2px 6px;
    font-size: 10px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    align-self: center;
  }
  .habitat-dl:hover { color: var(--accent); border-color: var(--accent); }
  .habitat-file { flex-direction: row; align-items: center; gap: 8px; }
  .habitat-file-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .habitat-archive-note {
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  /* Markdown viewer */
  .habitat-viewer {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: none;
  }
  .habitat-viewer.visible { display: block; }
  .habitat-viewer pre {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
  }
  /* Basic markdown rendering */
  .habitat-viewer h1, .habitat-viewer h2, .habitat-viewer h3 {
    color: var(--text);
    margin: 12px 0 6px;
    line-height: 1.3;
  }
  .habitat-viewer h1 { font-size: 16px; }
  .habitat-viewer h2 { font-size: 14px; }
  .habitat-viewer h3 { font-size: 13px; color: var(--text-dim); }
  .habitat-viewer p { font-size: 13px; color: var(--text-dim); margin: 6px 0; line-height: 1.6; }
  .habitat-viewer ul, .habitat-viewer ol { padding-left: 18px; margin: 6px 0; }
  .habitat-viewer li { font-size: 13px; color: var(--text-dim); margin: 2px 0; }
  .habitat-viewer code {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface-2);
    padding: 1px 4px;
    border-radius: 3px;
    color: var(--accent);
  }
  .habitat-viewer blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    margin: 8px 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .habitat-viewer hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .habitat-viewer strong { color: var(--text); }

  /* Agent panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.2s;
  }
  .panel:hover { border-color: var(--border-light); }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .agent-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
  .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .status-running { background: var(--green-dim); color: var(--green); }
  .status-starting { background: var(--surface-2); color: var(--text-muted); }
  .status-terminated { background: var(--red-dim); color: var(--red); }
  .status-shutting-down { background: var(--red-dim); color: var(--red); }
  .panel-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; display: flex; flex-direction: column; gap: 2px; }
  .panel-meta .mono { font-family: var(--mono); font-size: 11px; }
  .metrics-bar { display: flex; gap: 12px; padding: 6px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 6px 0; }
  .metric { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .metric-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text); }
  .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .iter-section { margin-top: 8px; }
  .iter-tag { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .iter-row { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 0; }
  .iter-row .k { color: var(--text-muted); margin-right: 4px; }
  .iter-row .v-action { color: var(--green); }
  .iter-row .v-result { color: var(--text-dim); }
  .iter-row .v-next { color: var(--accent); }
  .waiting { color: var(--text-dim); font-size: 12px; font-style: italic; margin-top: 8px; }

  @media (max-width: 600px) {
    .topbar, .controls, .direction-bar { padding-left: 14px; padding-right: 14px; }
    .grid { padding: 12px 14px; grid-template-columns: 1fr; }
    .habitat { display: none; }
    .resize-handle { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">kiro<span>-flock</span></div>
      <span id="cluster-badge" class="badge badge-starting">checking</span>
    </div>
    <span id="run-timer" class="clock" style="display:none">00:00:00</span>
    <button class="btn" id="btn-logout" style="display:none;font-size:11px;padding:4px 12px;background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border)" onclick="logout()">Sign out</button>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btn-start" onclick="startCluster()" disabled style="align-self:center;margin-top:15px;opacity:0.3">Start</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopCluster()" disabled style="align-self:center;margin-top:15px;opacity:0.3">Stop</button>
    <div class="field"><label>agents</label><div class="field-row"><div class="stepper"><button onclick="stepVal('in-concurrency',-1)">-</button><input id="in-concurrency" type="number" value="8" min="1" oninput="checkCapacity()"><button onclick="stepVal('in-concurrency',1)">+</button></div><span class="instance-spec" id="agents-usage"></span></div><span class="field-hint">amorphous agents</span></div>
    <div class="field"><label>neighbours</label><div class="stepper"><button onclick="stepVal('in-neighbours',-1)">-</button><input id="in-neighbours" type="number" value="1" min="0" max="8"><button onclick="stepVal('in-neighbours',1)">+</button></div><span class="field-hint">ring radius each side</span></div>
    <div class="field">
      <label>interval</label>
      <div class="stepper"><button onclick="stepVal('in-interval',-5)">-</button><input id="in-interval" type="number" value="30" min="0" max="600" style="width:50px" oninput="checkCapacity()"><button onclick="stepVal('in-interval',5)">+</button></div>
      <span class="field-hint">sec / pause between turns</span>
    </div>
    <div class="field">
      <label>instance</label>
      <select id="in-instance" onchange="updateInstanceSpec();checkCapacity()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-family:var(--mono);font-size:12px;min-width:280px"><option value="t4g.medium">loading…</option></select>
      <span class="field-hint">To run more agents, <a href="https://console.aws.amazon.com/servicequotas/home/services/ec2/quotas/L-1216C47A" target="_blank" style="color:var(--accent);text-decoration:none">increase your vCPU quota</a>. Config cap: <span id="concurrency-cap-label">600</span></span>
    </div>
    <div class="field"><label>model</label><span class="mono" style="font-size:12px;color:var(--text-muted)">auto</span><span class="field-hint">kiro default</span></div>
  </div>

  <div id="capacity-warn" style="display:none;padding:8px 24px;background:var(--red-dim);color:var(--red);font-size:12px;border-bottom:1px solid rgba(251,113,133,0.2)"></div>

  <div class="direction-bar">
    <div style="display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:space-between;align-self:stretch;flex-shrink:0">
      <label style="font-size:12px;color:var(--text-dim);white-space:nowrap;text-align:center;font-weight:600">Direction:</label>
      <button class="btn btn-save" onclick="saveDirection()">Save</button>
    </div>
    <div class="direction-input-wrap">
      <textarea id="in-direction" placeholder="Describe what the agents should work on…" oninput="syncDirectionBtn()"></textarea>
      <span class="direction-hint">Changes take effect on each agent's next iteration.</span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="main">
    <div class="grid-wrap">
      <div id="grid" class="grid"></div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="habitat" id="habitat">
      <div class="habitat-header">
        <span class="habitat-title">environment</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="habitat-dl" id="habitat-dl-all" style="display:none" onclick="downloadAllFiles()">&#8595; all</button>
          <button class="habitat-dl" id="habitat-refresh-btn" style="display:none" onclick="refreshHabitatFile()">&#8635;</button>
          <button class="habitat-dl" id="habitat-dl-btn" style="display:none" onclick="downloadHabitatFile()">&#8595; download</button>
          <button class="habitat-back" id="habitat-back" onclick="habitatBack()">&#8592; back</button>
        </div>
      </div>
      <div class="habitat-files" id="habitat-files"></div>
      <div class="habitat-viewer" id="habitat-viewer"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
